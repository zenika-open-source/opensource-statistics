name: Plumber compliance

on:
  push:
    branches: [main]
  pull_request: null

permissions:
  contents: read
  security-events: write
  id-token: write   # required to publish the Plumber Score

jobs:
  plumber:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: getplumber/plumber@a697e9c316b058d279861719c73b87093fb5a60f # v0.3.86
        with:
          threshold: "80"
          config-file: .plumber.yaml
          controls: actionsMustBePinnedByCommitSha,branchMustBeProtected
          score: "true"
          score-push: "true"
          soft-fail: "true"
          upload-sarif: "true"
          upload-artifacts: "true"
